[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hypforge"
version = "0.1.0"
description = "Hypothesis Pool Evolution for Oblique GBDT — GPU-accelerated, C++ tree backend"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["gradient-boosting", "oblique-trees", "machine-learning", "gpu"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "torch>=2.0",
    "numpy>=1.24",
    "scikit-learn>=1.3",
]

[project.optional-dependencies]
dev  = ["pytest>=8.0", "pytest-cov", "pandas", "matplotlib"]
full = ["pandas", "matplotlib"]

[project.urls]
Homepage   = "https://github.com/cree1116/hypforge"
Repository = "https://github.com/cree1116/hypforge"
Issues     = "https://github.com/cree1116/hypforge/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/hypforge"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "README.md",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"