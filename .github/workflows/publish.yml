name: Build and Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing

jobs:
  build-macos-arm64:
    runs-on: macos-latest  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenMP
        run: brew install libomp

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --no-isolation

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist/*.whl

  build-macos-x86:
    runs-on: macos-13  # Intel runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenMP
        run: brew install libomp

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --no-isolation

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-x86
          path: dist/*.whl

  build-linux-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ libomp-dev

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --no-isolation

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86
          path: dist/*.whl

  publish:
    needs: [build-macos-arm64, build-macos-x86, build-linux-x86]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          # No sdist — binary wheels only (no source code on PyPI)
