name: Build & Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # to upload Release assets
  id-token: write   # PyPI OIDC trusted publishing

jobs:
  build-wheels:
    name: Build wheels — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.19
        env:
          # Install torch CPU before running tests inside the wheel build
          CIBW_BEFORE_TEST: "pip install torch --index-url https://download.pytorch.org/whl/cpu"
          CIBW_TEST_COMMAND: "pytest {project}/tests -q"
          CIBW_TEST_EXTRAS: "dev"
          # Build Python 3.10–3.12 only
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          # Skip 32-bit and musl builds
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          # macOS: build universal2 (arm64 + x86_64)
          CIBW_ARCHS_MACOS: "arm64 x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "Cython>=3.0" numpy build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          path: dist/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach wheels to GitHub Release
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          path: dist/
          merge-multiple: true

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl